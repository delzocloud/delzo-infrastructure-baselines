name: Release

# Crea un GitHub Release automáticamente al pushear un tag SemVer (v1.2.3).
# Las notas se extraen de la sección correspondiente del CHANGELOG.md.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Extracting release notes for $VERSION"

          # Pull the block between '## [VERSION]' and the next '## [' header.
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { capture=1; next }
            capture && /^## \[/        { exit }
            capture                    { print }
          ' CHANGELOG.md > release_notes.md

          # Trim leading/trailing blank lines.
          sed -i -e '/./,$!d' release_notes.md
          awk 'NF{last=NR} {lines[NR]=$0} END{for(i=1;i<=last;i++) print lines[i]}' \
            release_notes.md > release_notes.tmp && mv release_notes.tmp release_notes.md

          if [ ! -s release_notes.md ]; then
            echo "No CHANGELOG entry found for $VERSION." >&2
            exit 1
          fi

          {
            echo "**Idiomas:** [Español](es/README.md) · [English](en/README.md) · [Português](pt/README.md)"
            echo ""
            cat release_notes.md
            echo ""
            echo "---"
            echo "> ⚠️ Guía de ejemplo, no una configuración lista para producción. Adaptala a cada infraestructura."
          } > release_body.md

          cat release_body.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME — Infrastructure Baselines" \
            --notes-file release_body.md